<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quick Job</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
    
</head>

<body>
    <div class="login-container">
        <!-- Login Card -->
        <div class="login-card">
            <!-- Left Side - Login Form -->
            <div class="login-form-section">
                <div class="form-content">
                    <!-- Login Title -->
                     <div class="login-logo">
                        <img src="images.png" alt="Quick Job Logo">
                     </div>

                    <h1 class="login-title">Log in</h1>

                    <!-- Login Form -->
                    <form class="login-form" action="index.html">
                        <input type="text" class="form-input" placeholder="Email address or Username" required>
                        <input type="password" class="form-input" placeholder="Password" required>
                        <button type="submit" class="login-btn">Login</button>
                    </form>

                    <!-- Social Login -->
                    <div class="social-login">
                        <p class="social-text">Log in using</p>
                        <div class="social-buttons">
                            <a href="#" class="social-btn google"> <i class="fab fa-google"></i> </a>
                            <a href="#" class="social-btn facebook"> <i class="fab fa-facebook-f"></i> </a>
                            <a href="#" class="social-btn twitter"> <i class="fab fa-x-twitter"></i> </a>
                        </div>
                    </div>

                    <!-- Create Account Link -->
                    <p class="signup-text">
                        Don't have Quick Job account? 
                        <a href="register.html" class="signup-link">Create now</a>
                    </p>

                    <p class ="signup-text">
                        Employer?
                        <a href="employerlogin.html" class="signup-link">Click here</a>
                    </p>

                    <p class ="signup-text">
                        Admin?
                        <a href="Adminlogin.html" class="signup-link">Click here</a>
                    </p>
                </div>
            </div>

            <!-- Vertical Divider -->
            <div class="divider"></div>

            <!-- Right Side - Branding -->
            <div class="branding-section">
                <div class="branding-content">
                    <!-- Brand Text Only -->
                    <div class="brand-logo">
                        <img src="images/images.png" alt="Quick Job Logo" class="brand-logo-img">
                        <div class="brand-text">
                            <div class="brand-name">QUICK JOB</div>
                            <div class="brand-tagline">SEARCHING</div>
                        </div>
                    </div>

                    <!-- Description -->
                    <p class="brand-description">
                        Quick Job website is a platform where you can find your preference job in just simple click
                    </p>

                    <!-- Learn More Button -->
                    <a href="#" class="learn-more-btn">Learn more</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
