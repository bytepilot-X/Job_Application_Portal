<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Quick Job</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="employerlogin.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">

           
            <div class="login-form-section">
                <div class="form-content">

                    <h1 class="login-title">Employer Login</h1>
                    <p class="login-subtitle">Restricted access. Authorized personnel only.</p>

                    <form class="login-form" action="employerDashboard.html">
                        <div class="input-group">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" class="form-input" placeholder="Admin Username" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-input" placeholder="Password" required>
                        </div>
                        
                        <button type="submit" class="login-btn">
                            <i class="fas fa-right-to-bracket"></i>
                            Sign In as Employer
                        </button>
                    </form>

                    <p class="back-link">
                        <a href="login.html"><i class="fas fa-arrow-left"></i> Back to User Login</a>
                    </p>

                </div>
            </div>

            
            <div class="divider"></div>

            
            <div class="branding-section">
                <div class="branding-content">

                    <div class="brand-logo">
                        <img src="images/images.png" alt="Quick Job Logo" class="brand-logo-img">
                        <div class="brand-text">
                            <div class="brand-name">QUICK JOB</div>
                            <div class="brand-tagline">ADMIN PANEL</div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
